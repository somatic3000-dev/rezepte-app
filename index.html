<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecipeFinder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">Rezeptsuche</p>
      <h1>RecipeFinder</h1>
      <p class="subtitle">
        Finde schnelle, einfache und passende Rezepte nach Zutaten, Zeit und Kategorie.
      </p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <input
        id="searchInput"
        type="search"
        placeholder="Suche nach Pasta, vegan, Reis, schnell..."
      />

      <select id="sortSelect">
        <option value="relevance">Sortieren: Relevanz</option>
        <option value="time">Sortieren: Kochzeit</option>
        <option value="title">Sortieren: Alphabetisch</option>
      </select>

      <select id="categorySelect">
        <option value="all">Alle Kategorien</option>
        <option value="Hauptgericht">Hauptgericht</option>
        <option value="Salat">Salat</option>
        <option value="Suppe">Suppe</option>
      </select>
    </section>

    <section class="toolbar">
      <div class="toolbar-actions">
        <button id="favoriteFilterButton" class="toolbar-button">
          Nur Favoriten anzeigen
        </button>

        <button id="shoppingListButton" class="toolbar-button">
          Einkaufsliste öffnen
        </button>
      </div>

      <p id="resultCount" class="result-count">
        0 Rezepte gefunden
      </p>
    </section>

    <section id="recipeGrid" class="recipe-grid"></section>
  </main>

  <div id="detailModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeDetails()"></div>

    <div class="modal-content">
      <button class="modal-close" onclick="closeDetails()">×</button>

      <p id="modalCategory" class="eyebrow"></p>
      <h2 id="modalTitle"></h2>
      <p id="modalDescription"></p>

      <div class="modal-meta">
        <span id="modalTime" class="tag"></span>
        <span id="modalDifficulty" class="tag"></span>
      </div>

      <h3>Zutaten</h3>
      <ul id="modalIngredients"></ul>

      <button id="modalShoppingButton" class="detail-shopping-button">
        Zutaten zur Einkaufsliste hinzufügen
      </button>

      <button id="modalFavoriteButton" class="detail-favorite-button">
        Als Favorit speichern
      </button>

      <a id="modalSource" class="detail-source-link" href="#" target="_blank">
        Originalrezept öffnen
      </a>
    </div>
  </div>

  <div id="shoppingModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeShoppingList()"></div>

    <div class="modal-content">
      <button class="modal-close" onclick="closeShoppingList()">×</button>

      <p class="eyebrow">Planung</p>
      <h2>Einkaufsliste</h2>
      <p>
        Hier findest du alle Zutaten, die du aus Rezepten hinzugefügt hast.
      </p>

      <div id="shoppingListItems" class="shopping-list"></div>

      <button id="clearShoppingListButton" class="danger-button">
        Einkaufsliste leeren
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
